apiVersion: batch/v1
kind: Job
metadata:
  name: brenox-migrate
  labels:
    app.kubernetes.io/component: migrate
spec:
  backoffLimit: 12
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: brenox-migrate:latest
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              migrate -path=/migrations \
                -database "postgres://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=disable" \
                up
          envFrom:
            - configMapRef:
                name: brenox-config
            - secretRef:
                name: brenox-secrets

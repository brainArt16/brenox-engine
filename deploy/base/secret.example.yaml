# Template only — do not apply with real production values.
# Create secrets via your overlay secretGenerator (dev) or:
#
#   kubectl create secret generic brenox-secrets -n brenox \
#     --from-literal=DB_USER=postgres \
#     --from-literal=DB_PASSWORD='...' \
#     --from-literal=JWT_SECRET='...' \
#     --from-literal=S3_ACCESS_KEY='...' \
#     --from-literal=S3_SECRET_KEY='...'
#
apiVersion: v1
kind: Secret
metadata:
  name: brenox-secrets
type: Opaque
stringData:
  DB_USER: postgres
  DB_PASSWORD: change-me
  JWT_SECRET: change-me-min-32-random-bytes
  S3_ACCESS_KEY: change-me
  S3_SECRET_KEY: change-me

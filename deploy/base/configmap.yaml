apiVersion: v1
kind: ConfigMap
metadata:
  name: brenox-config
data:
  PORT: "8080"
  DB_PORT: "5432"
  DB_NAME: brenox
  # Overridden per overlay (dev in-cluster hostnames vs managed services in prod).
  DB_HOST: postgres
  REDIS_URL: redis://redis:6379/0
  S3_ENDPOINT: minio:9000
  S3_BUCKET: brenox
  S3_USE_SSL: "false"
  S3_REGION: us-east-1
  MAX_UPLOAD_BYTES: "10485760"
  JWT_ACCESS_TTL_HOURS: "24"
  JWT_REFRESH_GRACE_HOURS: "168"
  PRESENCE_TTL_SECONDS: "120"
  WS_MAX_CONNECTIONS_PER_USER: "5"
  WS_MAX_CONNECTIONS_PER_IP: "20"
  CALL_MAX_PARTICIPANTS: "25"
  API_RATE_LIMIT_PER_MINUTE: "120"
  HTTP_RATE_LIMIT_PER_IP: "300"
  MAX_REQUEST_BODY_BYTES: "1048576"
  CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
  WS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000

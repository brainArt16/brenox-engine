apiVersion: apps/v1
kind: Deployment
metadata:
  name: brenox-engine
spec:
  template:
    spec:
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done
        - name: wait-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z redis 6379; do echo waiting for redis; sleep 2; done
      containers:
        - name: api
          image: brenox-engine:dev
          imagePullPolicy: IfNotPresent

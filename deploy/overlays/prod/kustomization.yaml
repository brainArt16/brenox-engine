apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: brenox

resources:
  - ../../base
  - ingress.yaml

replicas:
  - name: brenox-api
    count: 3

patches:
  - path: configmap-patch.yaml
  - path: deployment-patch.yaml
  - path: job-migrate-patch.yaml

# Secret brenox-secrets must exist in the cluster before apply.
# See README.md in this directory.

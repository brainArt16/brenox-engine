apiVersion: v1
kind: ConfigMap
metadata:
  name: brenox-config
data:
  DB_HOST: your-postgres-host.example.com
  REDIS_URL: redis://your-redis-host:6379/0
  S3_ENDPOINT: s3.amazonaws.com
  S3_USE_SSL: "true"
  CORS_ALLOWED_ORIGINS: https://www.breno-x.com
  WS_ALLOWED_ORIGINS: https://www.breno-x.com

# Deploy — API only; Postgres, Redis, and S3 are managed externally.
# The API image runs migrations on container start (see scripts/docker-entrypoint.sh).
# Set RUN_MIGRATIONS_ON_START=false to skip. For Coolify internal Postgres use DB_SSLMODE=disable.
#
#   make test-up | make prod-up

name: ${COMPOSE_PROJECT_NAME:-brenox}

services:
  migrate:
    profiles: [migrate]
    image: migrate/migrate:v4.17.1
    volumes:
      - ./sql/migrations:/migrations
    entrypoint: >
      sh -c 'migrate -path=/migrations
      -database="postgres://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT:-5432}/${DB_NAME}?sslmode=${DB_SSLMODE:-prefer}"
      up'

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: ${DEPLOY_RESTART:-unless-stopped}
    ports:
      - "${PORT:-8080}:8080"
    environment:
      PORT: "8080"
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME}
      DB_SSLMODE: ${DB_SSLMODE:-prefer}
      RUN_MIGRATIONS_ON_START: ${RUN_MIGRATIONS_ON_START:-true}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TTL_HOURS: ${JWT_ACCESS_TTL_HOURS:-24}
      JWT_REFRESH_GRACE_HOURS: ${JWT_REFRESH_GRACE_HOURS:-168}
      REDIS_URL: ${REDIS_URL}
      PRESENCE_TTL_SECONDS: ${PRESENCE_TTL_SECONDS:-120}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_USE_SSL: ${S3_USE_SSL:-true}
      S3_REGION: ${S3_REGION:-us-east-1}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-10485760}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      WS_ALLOWED_ORIGINS: ${WS_ALLOWED_ORIGINS}
      WS_MAX_CONNECTIONS_PER_USER: ${WS_MAX_CONNECTIONS_PER_USER:-5}
      WS_MAX_CONNECTIONS_PER_IP: ${WS_MAX_CONNECTIONS_PER_IP:-20}
      CALL_MAX_PARTICIPANTS: ${CALL_MAX_PARTICIPANTS:-25}
      API_RATE_LIMIT_PER_MINUTE: ${API_RATE_LIMIT_PER_MINUTE:-120}
      HTTP_RATE_LIMIT_PER_IP: ${HTTP_RATE_LIMIT_PER_IP:-300}
      MAX_REQUEST_BODY_BYTES: ${MAX_REQUEST_BODY_BYTES:-1048576}
      PLATFORM_ADMIN_EMAILS: ${PLATFORM_ADMIN_EMAILS:-}

services:
  postgres:
    image: postgres:16-alpine
    container_name: brenox_postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: brenox

    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: brenox_redis

    ports:
      - "6379:6379"

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5